<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能关怀助手 - Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .app { width: 100%; max-width: 375px; margin: 0 auto; background: #fff; min-height: 100vh; }
        .status-bar { height: 44px; background: #000; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 14px; }
        .header { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); color: white; padding: 24px 20px; display: flex; align-items: center; gap: 16px; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .header-info h2 { font-size: 18px; }
        .header-info p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .chat-container { padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .message { margin-bottom: 16px; }
        .message.bot { display: flex; gap: 12px; }
        .message.bot .msg-content { background: #f0f2f5; border-radius: 0 16px 16px 16px; padding: 12px 16px; max-width: 80%; }
        .message.user { display: flex; justify-content: flex-end; }
        .message.user .msg-content { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); color: white; border-radius: 16px 0 16px 16px; padding: 12px 16px; max-width: 80%; }
        .msg-content p { font-size: 14px; line-height: 1.5; }
        .msg-time { font-size: 11px; color: #999; margin-top: 4px; text-align: right; }
        .input-area { padding: 12px 20px; border-top: 1px solid #eee; display: flex; gap: 12px; align-items: center; }
        .input-area input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid #ddd; font-size: 14px; }
        .input-area button { width: 44px; height: 44px; border-radius: 50%; background: #ff6b6b; color: white; border: none; font-size: 18px; cursor: pointer; }
        .scene-tag { display: inline-block; padding: 4px 12px; background: rgba(255,107,107,0.1); color: #ff6b6b; border-radius: 12px; font-size: 12px; margin-bottom: 8px; }
        .quick-reply { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .reply-btn { padding: 8px 16px; background: #f0f4f8; border-radius: 20px; font-size: 13px; cursor: pointer; border: none; color: #555; }
        .reply-btn:hover { background: #e4e8ec; }
        .weather-box { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        .weather-box .title { font-size: 13px; opacity: 0.9; margin-bottom: 8px; }
        .weather-box .content { font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        <div class="header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h2>AI智能关怀助手</h2>
                <p>已连接 · 在线</p>
            </div>
        </div>
        <div class="chat-container">
            <div class="weather-box">
                <div class="title">📍 当前位置：北京市 · 海淀区</div>
                <div class="content">🌧️ 小雨 · 22°C · 湿度 78%</div>
            </div>
            
            <div class="message bot">
                <div class="avatar" style="width:36px;height:36px;font-size:18px;">🤖</div>
                <div class="msg-content">
                    <span class="scene-tag">🌧️ 雨天关怀场景</span>
                    <p>您好！检测到今天北京正在下雨，路上湿滑，请注意安全哦~</p>
                    <p>雨天容易让人心情低落，要不要来一杯热拿铁暖暖身子？现在下单立享8折优惠！☕</p>
                    <div class="quick-reply">
                        <button class="reply-btn">好的，来一杯！</button>
                        <button class="reply-btn">谢谢关心</button>
                        <button class="reply-btn">推荐其他饮品</button>
                    </div>
                </div>
            </div>

            <div class="message user">
                <div class="msg-content">
                    <p>好的，来一杯热拿铁！</p>
                    <div class="msg-time">9:42</div>
                </div>
            </div>

            <div class="message bot">
                <div class="avatar" style="width:36px;height:36px;font-size:18px;">🤖</div>
                <div class="msg-content">
                    <p>太棒了！您的热拿铁正在制作中，预计5分钟后可取。</p>
                    <p>另外，雨天路滑，建议您使用雨伞或雨衣，注意脚下安全~ 🌂</p>
                </div>
            </div>

            <div class="message bot">
                <div class="avatar" style="width:36px;height:36px;font-size:18px;">🤖</div>
                <div class="msg-content">
                    <span class="scene-tag">🌙 加班关怀场景</span>
                    <p>检测到您还在工作，已经晚上9点了哦~</p>
                    <p>要不要来一杯浓缩咖啡提提神？新推出的深夜陪伴套餐，买一送一！</p>
                    <div class="quick-reply">
                        <button class="reply-btn">需要！</button>
                        <button class="reply-btn">不用了，谢谢</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" placeholder="输入消息..." />
            <button>➤</button>
        </div>
    </div>
</body>
</html>
