<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据报告 - AI未来人才大赛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 60px 20px; text-align: center; }
        .header h1 { font-size: 36px; margin-bottom: 12px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .section { background: white; border-radius: 20px; padding: 32px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .section h2 { font-size: 22px; color: #333; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #10b981; }
        .metric-card { display: flex; gap: 20px; flex-wrap: wrap; }
        .metric { flex: 1; min-width: 200px; padding: 24px; background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border-radius: 16px; text-align: center; }
        .metric .value { font-size: 40px; font-weight: 800; color: #059669; margin-bottom: 8px; }
        .metric .label { font-size: 14px; color: #666; }
        .chart-box { height: 300px; background: #f8fafc; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .bar-chart { display: flex; align-items: flex-end; gap: 24px; height: 250px; padding: 20px; }
        .bar { width: 60px; background: linear-gradient(180deg, #10b981 0%, #059669 100%); border-radius: 8px 8px 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 8px; color: white; font-weight: 600; font-size: 12px; }
        .bar-label { text-align: center; margin-top: 8px; font-size: 12px; color: #666; }
        .ab-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ab-table th, .ab-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .ab-table th { background: #f8fafc; font-weight: 600; color: #333; }
        .sig-badge { display: inline-block; padding: 4px 12px; background: rgba(239,68,68,0.1); color: #ef4444; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .radar-chart { width: 300px; height: 300px; position: relative; }
        .radar-bg { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 数据报告</h1>
        <p>基于30人实验组A/B测试的详细数据分析</p>
    </div>
    <div class="container">
        <div class="section">
            <h2>📈 核心指标概览</h2>
            <div class="metric-card">
                <div class="metric"><div class="value">3.2x</div><div class="label">打开意愿提升</div></div>
                <div class="metric"><div class="value">68%</div><div class="label">点击转化率</div></div>
                <div class="metric"><div class="value">4.6/5</div><div class="label">用户好感度</div></div>
                <div class="metric"><div class="value">89%</div><div class="label">用户满意度</div></div>
            </div>
        </div>

        <div class="section">
            <h2>📊 打开意愿对比（A/B测试）</h2>
            <div class="chart-box">
                <div class="bar-chart">
                    <div style="display:flex;flex-direction:column;align-items:center;">
                        <div class="bar" style="height: 80px;">45%</div>
                        <div class="bar-label">对照组</div>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:center;">
                        <div class="bar" style="height: 220px;">92%</div>
                        <div class="bar-label">实验组</div>
                    </div>
                </div>
            </div>
            <p style="text-align:center;color:#666;">实验组打开意愿提升 <strong style="color:#10b981;">204%</strong> <span class="sig-badge">P&lt;0.05</span></p>
        </div>

        <div class="section">
            <h2>🔍 A/B测试详细数据</h2>
            <table class="ab-table">
                <tr><th>指标</th><th>对照组（传统推送）</th><th>实验组（AI关怀推送）</th><th>提升幅度</th><th>显著性</th></tr>
                <tr><td>推送打开率</td><td>45%</td><td>92%</td><td>+104%</td><td><span class="sig-badge">P&lt;0.05</span></td></tr>
                <tr><td>点击转化率</td><td>32%</td><td>68%</td><td>+112%</td><td><span class="sig-badge">P&lt;0.05</span></td></tr>
                <tr><td>用户好感度评分</td><td>3.2/5</td><td>4.6/5</td><td>+44%</td><td><span class="sig-badge">P&lt;0.05</span></td></tr>
                <tr><td>复购率</td><td>28%</td><td>52%</td><td>+86%</td><td><span class="sig-badge">P&lt;0.01</span></td></tr>
            </table>
        </div>

        <div class="section">
            <h2>🎯 用户感知雷达图</h2>
            <div class="chart-box">
                <div style="text-align:center;">
                    <svg class="radar-bg" viewBox="0 0 200 200">
                        <polygon points="100,20 180,75 180,125 100,180 20,125 20,75" fill="none" stroke="#10b981" stroke-width="2"/>
                        <polygon points="100,50 160,87 160,113 100,150 40,113 40,87" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
                        <polygon points="100,80 140,103 140,117 100,120 60,117 60,103" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>
                        <polygon points="100,40 170,85 170,115 100,160 30,115 30,85" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="2"/>
                        <text x="100" y="15" text-anchor="middle" font-size="12">个性化</text>
                        <text x="195" y="80" font-size="12">关怀感</text>
                        <text x="195" y="130" font-size="12">相关性</text>
                        <text x="100" y="195" font-size="12">及时性</text>
                        <text x="5" y="130" font-size="12">精准度</text>
                        <text x="5" y="80" font-size="12">满意度</text>
                    </svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
